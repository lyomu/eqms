spring:
  application:
    name: eqms-api
  mail:
    host: ${EQMS_MAIL_HOST:smtp.gmail.com}
    port: ${EQMS_MAIL_PORT:587}
    username: ${EQMS_MAIL_USERNAME:}
    password: ${EQMS_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  jpa:
    open-in-view: false
    hibernate:
      # Liquibase owns the schema. Hibernate must never auto-DDL a regulated database.
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: 8080
  servlet:
    session:
      timeout: 30m            # idle session timeout (compliance: bounded sessions)
      cookie:
        http-only: true
        same-site: strict

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

eqms:
  # Email notification settings.
  mail:
    from: ${EQMS_MAIL_FROM:noreply@eqms.local}
    from-name: ${EQMS_MAIL_FROM_NAME:eQMS Quality System}
    base-url: ${EQMS_BASE_URL:http://localhost:3000}
  # Authentication / lockout policy.
  auth:
    max-failed-attempts: 5
    lockout-minutes: 15
    totp-issuer: eQMS
  # Bootstrap admin (created on startup if absent). Password comes from EQMS_BOOTSTRAP_ADMIN_PASSWORD.
  bootstrap:
    admin-email: admin@eqms.local
    admin-username: admin
  # Electronic-signature HMAC config (used from Milestone 2). Override per environment.
  signature:
    hmac-key: ${EQMS_SIGNATURE_HMAC_KEY:dev-only-change-me}
    hmac-key-id: ${EQMS_SIGNATURE_HMAC_KEY_ID:dev-1}
  # S3-compatible object storage for regulated attachments.
  # Locally MinIO runs at http://localhost:9000 — see docker-compose.yml.
  # In production set EQMS_STORAGE_ENDPOINT_URL to your AWS region endpoint or remove it entirely.
  storage:
    endpoint-url: ${EQMS_STORAGE_ENDPOINT_URL:http://localhost:9000}
    region: ${EQMS_STORAGE_REGION:us-east-1}
    bucket: ${EQMS_STORAGE_BUCKET:eqms-attachments}
    access-key: ${EQMS_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${EQMS_STORAGE_SECRET_KEY:minioadmin}
    # path-style-access must be true for MinIO; set false for AWS S3 in production.
    path-style-access: ${EQMS_STORAGE_PATH_STYLE:true}
