# Integration-test profile.
#
# Tests connect to the PostgreSQL started by docker-compose (localhost:5432). The Spring
# datasource uses the DDL owner (eqms_owner) so Liquibase can create the schema, the eqms_app
# role, and the grants on context startup. The least-privilege eqms_app role is exercised
# directly by the privilege-enforcement test via its own JDBC connection.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/eqms
    username: eqms_owner
    password: owner_dev_pw
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    parameters:
      app_role_name: eqms_app
      app_role_password: app_dev_pw
  # Allow the integration tests to override the async taskExecutor with a synchronous one.
  main:
    allow-bean-definition-overriding: true

eqms:
  signature:
    hmac-key: test-hmac-key
    hmac-key-id: test-1
  dashboard:
    # Disable the dashboard TTL cache in tests so each query reflects current data deterministically.
    cache-ttl-seconds: 0
